anthropic_api_key: ""
telegram_bot_token: ""
telegram_chat_id: ""
telegram_mode: "direct"           # "direct" or "channel"

watchlist_mode: "all"             # "strict" | "dynamic" | "all"
watchlist_politicians:            # used when watchlist_mode is "strict"
  - "Nancy Pelosi"
  - "Dan Crenshaw"
  - "Michael McCaul"
  - "Josh Gottheimer"
  - "Brian Mast"
  - "Marjorie Taylor Greene"
  - "Tommy Tuberville"
  - "David Rouzer"

min_trades_for_dynamic: 5         # used when watchlist_mode is "dynamic"
min_win_rate: 0.60                # used when watchlist_mode is "dynamic"

# Signal strength gate — structured score determines signal_strength.
# Claude writes narrative only; algorithmic score gates alerts.
# "strong" (score ≥55) = highest-conviction: committee overlap + concentrated + large
# "moderate" (score ≥35) = recommended default — catches real signals, filters noise
# "weak" (<35) = everything passes (not recommended in "all" mode)
min_signal_strength: "moderate"

# Diversity controls — prevent one politician from flooding alerts
max_alerts_per_politician: 3      # max Telegram alerts per politician per run

# --- Scraper ---
scrape_pages_hard_cap: 50
max_trade_age_days: 90

# --- Entry point (DISCLOSURE DATE clock, ATR-normalised) ---
# Lazzaretto (2024): alpha accrues from disclosure, not from execution date.
# Blocks are expressed in ATR multiples — volatile stocks aren't unfairly penalised.
#
#  entry_block_atr_multiple   — hard block if stock moved > N ATR since disclosure
#  entry_caution_atr_multiple — caution flag if moved > N ATR (still alerts)
#  max_price_move_disc        — "discount entry" flag if stock fell > this % since disclosure
max_days_since_disclosure:  21    # suppress alerts for disclosures filed more than 21 days ago
                                  # (alpha window is tight post-disclosure; stale filings add noise)
entry_block_atr_multiple:   3.0   # block if +3 ATR since disclosure (opportunity passed)
entry_caution_atr_multiple: 1.5   # caution if +1.5 ATR (confirm thesis still valid)
max_price_move_disc: -10.0        # discount-entry if down >10% since disclosure

# --- Trade size filter ---
# min_size_band: minimum numeric band (0-7 scale) to pass the filter.
#   0 = all trades, 1 = $1K+, 2 = $15K+ (default), 3 = $50K+, 4 = $100K+
# Relative size scoring (vs politician's own history) happens separately in the score.
min_size_band: 2

db_path: "./data/capitol_radar.db"
log_level: "INFO"
