anthropic_api_key: ""
telegram_bot_token: ""
telegram_chat_id: ""
telegram_mode: "direct"           # "direct" or "channel"

watchlist_mode: "strict"          # "strict" | "dynamic" | "all"
watchlist_politicians:            # used when watchlist_mode is "strict"
  - "Nancy Pelosi"
  - "Dan Crenshaw"
  - "Michael McCaul"
  - "Josh Gottheimer"
  - "Brian Mast"
  - "Marjorie Taylor Greene"
  - "Tommy Tuberville"
  - "David Rouzer"

min_trades_for_dynamic: 5         # used when watchlist_mode is "dynamic"
min_win_rate: 0.60                # used when watchlist_mode is "dynamic"

# Signal strength gate — only alert on trades at or above this score.
# Especially important in "all" mode to avoid noise from the full congress.
# "strong" = only highest-conviction calls
# "moderate" = recommended default — catches real signals, filters noise
# "weak" = everything passes (not recommended in "all" mode)
min_signal_strength: "moderate"

# --- Scraper ---
# Pagination stops automatically once the oldest trade on a page is older
# than max_trade_age_days (set below) — so we always get exactly the right
# window without a fixed page count.
# scrape_pages_hard_cap is a safety ceiling to prevent runaway scraping
# if the site misbehaves; 50 pages ≈ 600 trades, well beyond any 90-day window.
scrape_pages_hard_cap: 50

# --- Entry-point quality filters ---
# Keeps alerts actionable: only fire when there is still a reasonable entry.
# The STOCK Act allows up to 45 days to disclose, so a freshly filed trade
# could be 45 days old — we use 90 days to catch late filers.
max_trade_age_days: 90            # suppress alerts for trades older than this

# Price-move thresholds (compared to closing price on the politician's trade date):
#   block  — hard suppress; the opportunity has already fully played out
#   warn   — still alert, but flag the move so the user can decide
#   disc   — stock is cheaper than when the politician bought; flag as discount entry
max_price_move_block: 40.0        # hard block if already up >40%
max_price_move_warn:  15.0        # caution flag if up 15–40%
max_price_move_disc: -10.0        # discount-entry flag if down >10% from politician's price

db_path: "./data/capitol_radar.db"
log_level: "INFO"
